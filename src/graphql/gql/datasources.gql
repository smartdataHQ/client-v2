mutation CreateDataSource($object: datasources_insert_input!) {
  insert_datasources_one(object: $object) {
    id
    name
    branches {
      id
    }
    sql_credentials {
      id
    }
  }
}

query Datasources(
  $offset: Int
  $limit: Int
  $where: datasources_bool_exp
  $order_by: [datasources_order_by!]
) {
  datasources(
    offset: $offset
    limit: $limit
    where: $where
    order_by: $order_by
  ) {
    id
    name
    db_params_computed
    db_type
    created_at
    updated_at
    branches(where: { status: { _eq: active } }) {
      id
    }
    sql_credentials {
      id
      username
      created_at
      updated_at
      user {
        id
        display_name
      }
    }
  }
  datasources_aggregate(where: $where) {
    aggregate {
      count
    }
  }
}

subscription AllDataSources(
  $offset: Int
  $limit: Int
  $where: datasources_bool_exp
  $order_by: [datasources_order_by!]
) {
  datasources(
    offset: $offset
    limit: $limit
    where: $where
    order_by: $order_by
  ) {
    id
    name
    db_params_computed
    db_type
    created_at
    updated_at
    branches(where: { status: { _eq: active } }) {
      id
    }
    sql_credentials {
      id
      username
      created_at
      updated_at
      user {
        id
        display_name
      }
    }
  }
}

query FetchTables($id: uuid!) {
  fetch_tables(datasource_id: $id) {
    schema
  }
}

query FetchMeta($datasource_id: uuid!, $branch_id: uuid) {
  fetch_meta(datasource_id: $datasource_id, branch_id: $branch_id) {
    cubes
  }
}

query CurrentDataSource($id: uuid!) {
  datasources_by_pk(id: $id) {
    id
    name
    db_type
    db_params_computed
    created_at
    updated_at
  }
}

mutation UpdateDataSource(
  $pk_columns: datasources_pk_columns_input!
  $_set: datasources_set_input!
) {
  update_datasources_by_pk(pk_columns: $pk_columns, _set: $_set) {
    id
    branches (where: { status: { _eq: active }}) {
      id
    }
  }
}

mutation CheckConnection($id: uuid!) {
  check_connection(datasource_id: $id) {
    message
    code
  }
}

mutation DeleteDataSource($id: uuid!) {
  delete_datasources_by_pk(id: $id) {
    id
  }
}

mutation GenDataSchemas(
  $datasource_id: uuid!
  $branch_id: uuid!
  $tables: [SourceTable!]!
  $overwrite: Boolean
  $format: String
) {
  gen_dataschemas(
    datasource_id: $datasource_id
    branch_id: $branch_id
    tables: $tables
    overwrite: $overwrite
    format: $format
  ) {
    code
    message
  }
}

mutation RunSourceSQLQuery(
  $datasource_id: uuid!
  $query: String!
  $limit: Int!
) {
  run_query(datasource_id: $datasource_id, query: $query, limit: $limit) {
    result
  }
}

query ProfileTable(
  $datasource_id: uuid!
  $branch_id: uuid!
  $table_name: String!
  $table_schema: String!
) {
  profile_table(
    datasource_id: $datasource_id
    branch_id: $branch_id
    table_name: $table_name
    table_schema: $table_schema
  ) {
    code
    row_count
    sampled
    sample_size
    columns {
      name
      raw_type
      column_type
      value_type
      has_values
      value_rows
      unique_values
      min_value
      max_value
      avg_value
      max_array_length
      unique_keys
      lc_values
      key_stats
      description
    }
    array_candidates {
      column
      element_type
      suggested_alias
    }
    primary_keys
    existing_model {
      file_name
      file_format
      has_user_content
      supports_reprofile
      suggested_merge_strategy
    }
    raw_profile
  }
}

mutation SmartGenDataSchemas(
  $datasource_id: uuid!
  $branch_id: uuid!
  $table_name: String!
  $table_schema: String!
  $array_join_columns: [ArrayJoinInput]
  $max_map_keys: Int
  $merge_strategy: String
  $profile_data: jsonb
  $dry_run: Boolean
) {
  smart_gen_dataschemas(
    datasource_id: $datasource_id
    branch_id: $branch_id
    table_name: $table_name
    table_schema: $table_schema
    array_join_columns: $array_join_columns
    max_map_keys: $max_map_keys
    merge_strategy: $merge_strategy
    profile_data: $profile_data
    dry_run: $dry_run
  ) {
    code
    message
    version_id
    file_name
    changed
    change_preview
  }
}

mutation UpdateTeamSettings($team_id: uuid!, $settings: jsonb!) {
  update_team_settings(team_id: $team_id, settings: $settings) {
    code
    message
  }
}

mutation CopyDatasource($datasource_id: uuid!, $target_team_id: uuid!) {
  copy_datasource(datasource_id: $datasource_id, target_team_id: $target_team_id) {
    id
    name
  }
}
